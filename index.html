<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistente de Respostas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #F7F4EF;
    --card: #FFFFFF;
    --accent: #2D6A4F;
    --accent-light: #E8F4EF;
    --accent-mid: #52B788;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --border: #E0DBD3;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--accent);
    padding: 28px 32px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header-icon {
    width: 42px; height: 42px;
    background: rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }

  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #fff;
    font-weight: 400;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 20px 48px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 24px;
    box-shadow: var(--shadow);
  }

  .card-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .situacao-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    resize: vertical;
    min-height: 100px;
    transition: border-color 0.2s;
    outline: none;
    line-height: 1.6;
  }

  .situacao-input:focus { border-color: var(--accent-mid); background: #fff; }
  .situacao-input::placeholder { color: #ADADAD; }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    background: var(--bg);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }

  .gerar-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .gerar-btn:hover { background: #245a42; transform: translateY(-1px); }
  .gerar-btn:active { transform: translateY(0); }
  .gerar-btn:disabled { background: #A8C5B8; cursor: not-allowed; transform: none; }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .resultado-card {
    display: none;
    background: var(--card);
    border-radius: 16px;
    border: 1.5px solid var(--accent-mid);
    padding: 24px;
    box-shadow: var(--shadow);
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .resultado-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .resultado-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .copiar-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copiar-btn:hover { background: var(--accent-light); }
  .copiar-btn.copiado { background: var(--accent); color: #fff; }

  .resultado-texto {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
  }

  .nova-btn {
    margin-top: 16px;
    padding: 9px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .nova-btn:hover { border-color: var(--accent-mid); color: var(--accent); background: var(--accent-light); }

  .erro {
    display: none;
    background: #FFF0F0;
    border: 1px solid #FFCCCC;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    color: #CC3333;
  }

  .historico-section { display: none; }

  .historico-title {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .historico-item {
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .historico-item:hover { border-color: var(--accent-mid); background: var(--accent-light); }

  .historico-situacao {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .historico-preview {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">💬</div>
  <div class="header-text">
    <h1>Assistente de Respostas</h1>
    <p>Descreva a situacao e receba uma resposta pronta para enviar</p>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-label">Situacao do atendimento</div>
    <textarea class="situacao-input" id="situacao" placeholder="Ex: paciente querendo remarcar consulta cancelada pelo medico, ela esta um pouco frustrada..."></textarea>
    <div class="chips">
      <span class="chip" onclick="usarSugestao('Paciente querendo cancelar consulta de ultima hora')">Cancelamento</span>
      <span class="chip" onclick="usarSugestao('Paciente com duvida sobre como funciona o plano de saude')">Duvida de plano</span>
      <span class="chip" onclick="usarSugestao('Paciente insatisfeito com tempo de espera no atendimento')">Reclamacao</span>
      <span class="chip" onclick="usarSugestao('Paciente pedindo para remarcar consulta agendada')">Reagendamento</span>
      <span class="chip" onclick="usarSugestao('Paciente com duvida sobre documentos necessarios para consulta')">Documentos</span>
      <span class="chip" onclick="usarSugestao('Paciente perguntando sobre resultado de exame')">Resultado de exame</span>
    </div>
  </div>

  <button class="gerar-btn" id="gerarBtn" onclick="gerarResposta()">
    <div class="spinner" id="spinner"></div>
    <span id="btnTexto">✦ Gerar resposta</span>
  </button>

  <div class="erro" id="erro"></div>

  <div class="resultado-card" id="resultado">
    <div class="resultado-header">
      <div class="resultado-label">Resposta gerada</div>
      <button class="copiar-btn" id="copiarBtn" onclick="copiarTexto()">
        <span id="copiarTexto">Copiar</span>
      </button>
    </div>
    <div class="resultado-texto" id="resultadoTexto"></div>
    <button class="nova-btn" onclick="gerarResposta()">+ Nova resposta para esta situacao</button>
  </div>

  <div class="historico-section" id="historicoSection">
    <div class="historico-title">Respostas anteriores</div>
    <div id="historicoLista"></div>
  </div>

</div>

<script>
  const GEMINI_API_KEY = "AIzaSyDh-CR4nTLz9B1wT19snll9iHUWvTjQ6JE";
  const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;

  const historico = [];

  function usarSugestao(texto) {
    document.getElementById('situacao').value = texto;
    document.getElementById('situacao').focus();
  }

  async function gerarResposta() {
    const situacao = document.getElementById('situacao').value.trim();
    if (!situacao) {
      mostrarErro('Descreva a situacao do atendimento antes de gerar a resposta.');
      return;
    }

    setLoading(true);
    esconderErro();
    document.getElementById('resultado').style.display = 'none';

    const prompt = `Voce e um assistente especializado em atendimento ao cliente e pacientes. Gere uma resposta pronta para copiar e colar, com tom cordial, acolhedor e empatico.

Regras:
- Tom sempre caloroso e humano, nunca robotico
- Se houver frustracao ou reclamacao, reconheca o sentimento antes de resolver
- Resposta direta, maximo 4 paragrafos curtos
- Use "voce" para se referir ao paciente
- Sem emojis em excesso
- Assine como: Equipe de Atendimento
- Retorne apenas a resposta pronta, sem explicacoes adicionais

Situacao: ${situacao}`;

    try {
      const response = await fetch(GEMINI_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'Erro na API');

      const texto = data.candidates[0].content.parts[0].text;
      document.getElementById('resultadoTexto').textContent = texto;
      document.getElementById('resultado').style.display = 'block';

      historico.unshift({ situacao, texto });
      if (historico.length > 5) historico.pop();
      atualizarHistorico();

    } catch (err) {
      mostrarErro('Nao foi possivel gerar a resposta. Verifique sua conexao e tente novamente.');
    } finally {
      setLoading(false);
    }
  }

  function copiarTexto() {
    const texto = document.getElementById('resultadoTexto').textContent;
    navigator.clipboard.writeText(texto).then(() => {
      const btn = document.getElementById('copiarBtn');
      const span = document.getElementById('copiarTexto');
      btn.classList.add('copiado');
      span.textContent = '✓ Copiado!';
      setTimeout(() => { btn.classList.remove('copiado'); span.textContent = 'Copiar'; }, 2000);
    });
  }

  function atualizarHistorico() {
    if (historico.length < 2) return;
    document.getElementById('historicoSection').style.display = 'block';
    document.getElementById('historicoLista').innerHTML = historico.slice(1).map((h, i) => `
      <div class="historico-item" onclick="carregarHistorico(${i + 1})">
        <div class="historico-situacao">${h.situacao}</div>
        <div class="historico-preview">${h.texto.substring(0, 80)}...</div>
      </div>
    `).join('');
  }

  function carregarHistorico(idx) {
    const h = historico[idx];
    document.getElementById('situacao').value = h.situacao;
    document.getElementById('resultadoTexto').textContent = h.texto;
    document.getElementById('resultado').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function setLoading(on) {
    document.getElementById('gerarBtn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btnTexto').textContent = on ? 'Gerando resposta...' : '✦ Gerar resposta';
  }

  function mostrarErro(msg) {
    const el = document.getElementById('erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function esconderErro() {
    document.getElementById('erro').style.display = 'none';
  }

  document.getElementById('situacao').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.ctrlKey) gerarResposta();
  });
</script>
</body>
</html>
